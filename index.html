<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPI - Analisi Potenziale</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/sidebar.css">
</head>

<body>
    <div class="app-container">
        <header id="blocco-titolo">
            <div class="titolo-sinistra">
                <h1>Dashboard SPI</h1>
                <span class="badge">Analisi Geospaziale</span>
            </div>
            <div class="menu-destra">
                <p class="fonte-dati">Data: <strong>PVGIS-SARAH | ISTAT | MEF</strong></p>
            </div>
        </header>

        <div class="top-half">
            <aside class="sidebar">
                <div class="parameters-container">
                    <h3>Pesi dell'Indice SPI</h3>
                    <p class="instruction-text">
                        <em>Nota: La somma totale dei pesi deve essere esattamente pari al 100% per avviare il
                            calcolo.</em>
                    </p>

                    <div class="parameter-item">
                        <label for="w_irrad">Irradiazione Solare</label>
                        <input type="range" id="w_irrad" class="weight-slider" min="0" max="100" value="40">
                        <span class="weight-val" id="val_irrad">40%</span>
                    </div>

                    <div class="parameter-item">
                        <label for="w_reddito">Reddito Medio</label>
                        <input type="range" id="w_reddito" class="weight-slider" min="0" max="100" value="30">
                        <span class="weight-val" id="val_reddito">30%</span>
                    </div>

                    <div class="parameter-item">
                        <label for="w_tecnico">Edifici Bassi</label>
                        <input type="range" id="w_edifici" class="weight-slider" min="0" max="100" value="30">
                        <span class="weight-val" id="val_edifici">30%</span>
                    </div>

                    <div class="total-weight-container">
                        <strong>Totale Pesi: <span id="total-weight" style="color: green;">100%</span></strong>
                    </div>

                    <button id="calculate-btn" class="primary-btn">Calcola Indice sulla Mappa</button>
                </div>

                <div id="ranking-container">
                    <h3>Ranking Regioni</h3>
                    <ul id="regions-list"></ul>
                </div>
            </aside>

            <main id="map-italia"></main>
        </div>

        <div id="blocco-dettaglio" class="bottom-half nascosto">
            <div class="pannello-tabella">
                <h3 id="nome-regione-titolo">Dettaglio Regione</h3>
                <table id="tabella-province">
                    <thead>
                        <tr>
                            <th>Provincia</th>
                            <th>Indice SPI</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabella">
                    </tbody>
                </table>
            </div>
            <div id="map-regione"></div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/map.js"></script>
    <script src="./js/sidebar.js"></script>
</body>

</html>
