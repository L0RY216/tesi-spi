<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPI - Analisi Potenziale</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>Parametri</h2>
            <div id="controls">
                </div>
        </aside>

        <main class="main-content">
            <div id="map-italia"></div>

            <div id="blocco-dettaglio" class="nascosto">
                
                <div class="pannello-tabella">
                    <h3 id="nome-regione-titolo">Seleziona una regione</h3>
                    <table id="tabella-province">
                        <thead>
                            <tr>
                                <th>Provincia</th>
                                <th>Indice SPI</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabella">
                            </tbody>
                    </table>
                </div>

                <div id="map-regione"></div>
                
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/map.js"></script>
</body>
</html>
