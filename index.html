<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPI - Analisi Potenziale</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="app-container">
        <header id="blocco-titolo">
            <div class="titolo-sinistra">
                <h1>Dashboard SPI</h1>
                <span class="badge">Analisi Geospaziale</span>
            </div>
            <div class="menu-destra">
                <p class="fonte-dati">Data: <strong>PVGIS-SARAH | ISTAT</strong></p>
            </div>
        </header>

        <div class="top-half">
            <aside class="sidebar">
                <h2>Parametri SPI</h2>
                <div id="controls">
                    <p>Seleziona i parametri per ricalcolare l'indice.</p>
                </div>
            </aside>
            <main id="map-italia"></main>
        </div>

        <div id="blocco-dettaglio" class="bottom-half nascosto">
            <div class="pannello-tabella">
                <h3 id="nome-regione-titolo">Dettaglio Regione</h3>
                <table id="tabella-province">
                    <thead>
                        <tr>
                            <th>Provincia</th>
                            <th>Indice SPI</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabella">
                    </tbody>
                </table>
            </div>
            <div id="map-regione"></div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/map.js"></script>
</body>

</html>
